name: Scrape News

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scraper

      - name: Run scraper
        run: node scraper.js
        working-directory: scraper

      - name: Commit and push
        run: |
          git config user.name  "News Bot"
          git config user.email "news-bot@noreply.github.com"
          git add docs/data/articles.json
          git diff --staged --quiet || git commit -m "chore: update news data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
