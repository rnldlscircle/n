name: 뉴스 자동 스크랩

on:
  schedule:
    - cron: "0 */2 * * *"   # 매 2시간마다 (UTC 기준)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # docs/data/articles.json 커밋 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json

      - name: 패키지 설치
        run: npm ci
        working-directory: scraper

      - name: 뉴스 스크랩 실행
        run: node scraper.js
        working-directory: scraper

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "News Bot"
          git config user.email "news-bot@noreply.github.com"
          git add docs/data/articles.json
          git diff --staged --quiet || git commit -m "chore: 뉴스 데이터 업데이트 $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
